<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            /* 像是撑开盒子的高度 */
            min-height: 100vh;
            position: relative;
        }

        

        /* 便签背景 */
        section[class^="section"] {
            width: 100%;
            height: 100vh; /* 使用视口高度，撑开全屏 */
        }

        .content {
            width: 100%;
            height: 25%;
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            line-height: 30px;
            padding: 20px;
            font-size: 16px;
            box-sizing: border-box;
            /* 文字居中 */
            text-align: center;
            /* 垂直居中 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .section1 {
            background: url(./1.png) no-repeat fixed center center/cover;
        }
        .section2 {
            background: url(./2.png) no-repeat fixed center center/cover;
        }
        .section3 {
            background: url(./3.png) no-repeat fixed center center/cover;
        }
        .section4 {
            background: url(./4.png) no-repeat fixed center center/cover;
        }
     
    </style>
</head>
<body>
    <!-- 便签容器背景 -->
     <!-- 第一屏 -->
      <section class="section1">
        <div class="content">
            <h1>拖拽便签系统</h1>
            <p>添加便签按钮开始使用</p>
        </div>
      </section>
    <!-- 第二屏 -->
     <section class="section2">
        <div class="content">
            <h1>拖拽便签系统</h1>
            <p>添加便签按钮开始使用</p>
        </div>
      </section>
      <!-- 第三屏 -->

        <div class="content">
            <h1>拖拽便签系统</h1>
            <p>添加便签按钮开始使用</p>
        </div>
      </section>
      <!-- 第四屏 -->

        <div class="content">
            <h1>拖拽便签系统</h1>
            <p>添加便签按钮开始使用</p>
        </div>
      </section>

</body>
</html>
